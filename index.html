async function loadGmailReceipts() {
    if (!sb) return;
    const tbody = document.getElementById('gmail-tbody');
    const statsEl = document.getElementById('gmail-stats');
    if (!tbody) return;

    const { data, error } = await sb
        .from('incoming_receipts')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(100);

    if (error) {
        if (tbody) tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#DC2626;padding:24px;">${error.message}</td></tr>`;
        return;
    }

    gmailRows = data || [];

    // Stats
    const pending = gmailRows.filter(r => r.status === 'pending').length;
    const processing = gmailRows.filter(r => r.status === 'processing').length;
    const done = gmailRows.filter(r => r.status === 'done').length;
    const failed = gmailRows.filter(r => r.status === 'failed').length;
    const total = gmailRows.length;

    // Progress bar
    const progressWrap = document.getElementById('gmail-progress-wrap');
    const progressFill = document.getElementById('gmail-progress-fill');
    const progressLabel = document.getElementById('gmail-progress-label');
    const progressStep = document.getElementById('gmail-progress-step');
    const isActive = pending > 0 || processing > 0;
    if (progressWrap) {
        progressWrap.style.display = isActive ? '' : 'none';
        if (isActive && progressFill && progressLabel) {
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `${done} of ${total} processed (${pct}%)`;
            // Show which step the currently-processing row is on
            const processingRow = gmailRows.find(r => r.status === 'processing');
            if (progressStep) {
                if (processingRow) {
                    const stepLabels = { downloading: 'Downloading file…', extracting: 'Reading with AI…', posting: 'Posting to Jobber…' };
                    progressStep.textContent = stepLabels[processingRow.step] || `Processing ${processingRow.file_name || 'file'}…`;
                } else {
                    progressStep.textContent = `${pending} file${pending !== 1 ? 's' : ''} queued`;
                }
            }
        }
    }

    // Auto-poll every 6s while anything is active; stop when done
    if (isActive) {
        if (!window._gmailProgressPoll) {
            window._gmailProgressPoll = setInterval(async () => {
                if (state.view !== 'gmail') return;
                await loadGmailReceipts();
            }, 6000);
        }
    } else {
        if (window._gmailProgressPoll) { clearInterval(window._gmailProgressPoll); window._gmailProgressPoll = null; }
    }

    // Update badge
    const badge = document.getElementById('gmail-badge');
    if (badge) {
        badge.style.display = pending > 0 ? '' : 'none';
        badge.textContent = pending;
    }

    if (statsEl) statsEl.innerHTML = `
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value" style="color:#D97706;">${pending + processing}</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-value" style="color:#059669;">${done}</div><div class="stat-label">Done</div></div>
        <div class="stat-card"><div class="stat-value" style="color:#DC2626;">${failed}</div><div class="stat-label">Failed</div></div>
    `;

    if (!gmailRows.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:32px;">No emailed receipts yet</td></tr>`;
        return;
    }

    const stepLabel = (r) => {
        if (r.status !== 'processing') return '';
        const labels = { downloading: ' — downloading', extracting: ' — reading AI', posting: ' — posting' };
        return labels[r.step] || '';
    };

    const statusBadge = (r) => {
        if (r.status === 'done')       return `<span class="badge badge-posted">✓ In Jobber</span>`;
        if (r.status === 'failed')     return `<span class="badge badge-error">Failed</span>`;
        if (r.status === 'processing') return `<span class="badge badge-processing"><i class="fa-solid fa-spinner fa-spin" style="font-size:10px;margin-right:4px;"></i>Processing${stepLabel(r)}</span>`;
        return `<span class="badge" style="background:#F3F4F6;color:#6B7280;">Pending</span>`;
    };

    tbody.innerHTML = gmailRows.map(r => `<tr>
        <td style="font-size:12px;color:#374151;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(r.email_from||'').replace(/"/g,'&quot;')}">${r.email_from || '—'}</td>
        <td style="font-size:12px;color:#374151;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(r.email_subject||'').replace(/"/g,'&quot;')}">${r.email_subject || '—'}</td>
        <td style="font-size:12px;font-family:monospace;color:#6B7280;">${r.file_name || '—'}</td>
        <td style="font-size:11.5px;color:#6B7280;white-space:nowrap;">${r.created_at ? new Date(r.created_at).toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'}</td>
        <td>${statusBadge(r)}</td>
        <td style="font-size:11.5px;color:#DC2626;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(r.error||'').replace(/"/g,'&quot;')}">${r.error || ''}</td>
        <td>${r.status === 'pending' || r.status === 'failed' ? `<button class="btn btn-secondary btn-sm" onclick="processSingleRow('${r.id}')"><i class="fa-solid fa-play" style="font-size:10px;"></i> Run</button>` : ''}</td>
    </tr>`).join('');
}

async function processSingleRow(id) {
    const row = gmailRows.find(r => r.id === id);
    if (!row) return;
    toast('Processing receipt…', 'info');
    const result = await processGmailRow(row);
    if (result.success && result.jobberPosted) toast('Posted to Jobber!', 'success', 5000);
    else if (result.success && !result.jobberPosted) toast('Processed but Jobber failed: ' + (result.jobberError || 'Unknown'), 'warning', 7000);
    else toast('Failed: ' + (result.error || 'Unknown error'), 'error', 6000);
    await loadGmailReceipts();
}

async function triggerProcessNow() {
    const allPending = gmailRows.filter(r => r.status === 'pending' || r.status === 'failed');
    if (!allPending.length) { toast('No pending receipts to process', 'info'); return; }
    // Deduplicate by file_url
    const seenUrls2 = new Set();
    const pending = allPending.filter(r => { if (seenUrls2.has(r.file_url)) return false; seenUrls2.add(r.file_url); return true; });
    const btn = document.getElementById('process-now-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing…'; }
    let posted = 0, savedOnly = 0, fail = 0;
    for (const row of pending) {
        const result = await processGmailRow(row);
        if (result.success && result.jobberPosted) posted++;
        else if (result.success) { savedOnly++; }
        else fail++;
    }
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Process Now'; }
    if (posted > 0) toast(`${posted} posted to Jobber!`, 'success', 5000);
    if (savedOnly > 0) toast(`${savedOnly} saved but not posted to Jobber — check job numbers`, 'warning', 7000);
    if (fail > 0) toast(`${fail} failed — check errors column`, 'error', 6000);
    await loadGmailReceipts();
}

async function processGmailRow(row) {
    // Atomic claim: only mark processing if still pending — prevents race with server-side cron
    const { data: claimed } = await sb
        .from('incoming_receipts')
        .update({ status: 'processing' })
        .eq('id', row.id)
        .eq('status', 'pending')
        .select('id');
    if (!claimed || claimed.length === 0) return { success: false, error: 'Already claimed by another process' };

    const failRow = async (msg) => {
        await sb.from('incoming_receipts').update({
            status: 'failed', error: msg, processed_at: new Date().toISOString()
        }).eq('id', row.id);
        return { success: false, error: msg };
    };

    try {
        // 1. Extract via Gemini
        const extractRes = await authedFetch('/api/extract-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileUrl: row.file_url, mimeType: 'application/pdf', originalName: row.file_name })
        });
        const extractData = await extractRes.json();
        if (!extractData.success) return failRow(extractData.error || 'Gemini extraction failed');

        const { vendor, invoiceNo, date, total, jobNo, items } = extractData.data;

        // 2. Job number is required — no silent save
        if (!jobNo) return failRow('No job number found on receipt');

        // 3. Post to Jobber — required
        const expRes = await authedFetch('/api/create-expense', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ vendor, invoiceNo, date, total, jobNo, receiptBlobUrl: row.file_url })
        });
        const expData = await expRes.json();
        if (!expData.success) return failRow(expData.error || 'Jobber post failed');

        // 4. Save to receipts history as posted
        const rec = {
            id: crypto.randomUUID(),
            vendor: vendor || null,
            date: date || null,
            amount: parseFloat(total) || 0,
            total: total ? String(total) : null,
            jobNo: jobNo || null,
            invoiceNo: invoiceNo || null,
            items: items || [],
            receiptBlobUrl: row.file_url || null,
            jobberExpenseId: expData.expenseId || null,
            status: 'posted',
            error: null,
            savedAt: new Date().toISOString(),
            category: null
        };
        state.history.unshift(rec);
        updateBadge();
        await upsertReceipt(rec);

        // 5. Mark incoming row done
        await sb.from('incoming_receipts').update({
            status: 'done', error: null, processed_at: new Date().toISOString()
        }).eq('id', row.id);

        return { success: true, jobberPosted: true };

    } catch (err) {
        return failRow(err.message || 'Unknown error');
    }
}

/* ── Jobber OAuth connect ── */
async function connectJobber() {
    try {
        const res = await authedFetch(API_BASE + '/api/jobber-status');
        const data = await res.json();
        if (data.authUrl) {
            window.open(data.authUrl, '_blank', 'width=600,height=700');
            toast('Complete the Jobber authorisation in the popup, then refresh this page.', 'info', 7000);
        } else {
            toast('No OAuth URL available. Check JOBBER_CLIENT_ID is set.', 'error');
        }
    } catch (err) {
        toast('Could not get Jobber auth URL: ' + err.message, 'error');
    }
}

/* ── Event Binding ── */
function bind() {
    const dz = document.getElementById('drop-zone');
    if (dz) {
        dz.addEventListener('click', () => document.getElementById('file-input').click());
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('dragover'); });
        dz.addEventListener('drop', e => {
            e.preventDefault();
            dz.classList.remove('dragover');
            if (e.dataTransfer.files.length) startFileQueue(Array.from(e.dataTransfer.files));
        });
    }

    const fi = document.getElementById('file-input');
    if (fi) {
        fi.addEventListener('change', e => {
            if (e.target.files.length) startFileQueue(Array.from(e.target.files));
            e.target.value = '';
        });
    }

    const bSave = document.getElementById('btn-save');
    if (bSave) bSave.addEventListener('click', saveReceipt);
    const bFlag = document.getElementById('btn-flag');
    if (bFlag) bFlag.addEventListener('click', flagError);
    const bJobber = document.getElementById('btn-jobber');
    if (bJobber) bJobber.addEventListener('click', postToJobber);

    const hs = document.getElementById('history-search');
    if (hs) hs.addEventListener('input', filterHistory);
    const hf = document.getElementById('history-filter');
    if (hf) hf.addEventListener('change', filterHistory);
    initHistoryPdf();

    const sConfirm = document.getElementById('set-confirm');
    if (sConfirm) sConfirm.addEventListener('change', () => {
        state.settings.requireConfirm = sConfirm.checked;
        toast('Setting updated', 'success');
    });
    const sCat = document.getElementById('set-category');
    if (sCat) sCat.addEventListener('change', () => {
        state.settings.category = sCat.value;
        toast('Setting updated', 'success');
    });

    const fjob = document.getElementById('f-jobno');
    if (fjob) {
        fjob.addEventListener('input', () => {
            const v = fjob.value.trim();
            state.receipt.jobStatus = v ? 'found' : 'missing';
            state.receipt.jobNo = v;
            render();
        });
    }

    // Settings page status checks
    const sapiEl = document.getElementById('settings-api-status');
    const sjobberEl = document.getElementById('settings-jobber-status');
    const sModelEl = document.getElementById('settings-model');
    const sBlobEl = document.getElementById('settings-blob-status');
    const bConnect = document.getElementById('btn-jobber-connect');
    const connectOk = document.getElementById('jobber-connect-ok');

    const pill = (ok, label) => ok
        ? `<span style="font-size:11px;font-weight:600;background:rgba(16,185,129,0.15);color:#059669;padding:2px 9px;border-radius:999px;">${label}</span>`
        : `<span style="font-size:11px;font-weight:600;background:rgba(239,68,68,0.1);color:#DC2626;padding:2px 9px;border-radius:999px;">${label}</span>`;

    if (sapiEl) {
        authedFetch(API_BASE + '/api/health').then(r => r.ok ? r.json() : null).then(d => {
            if (d) {
                sapiEl.innerHTML = `<span style="color:#059669;font-weight:600;">Connected — ${d.model || 'Gemini'}</span>`;
                if (sModelEl) sModelEl.textContent = (d.model || 'Gemini') + ' (Vision)';
                const blobOk = !!d.blobConfigured;
                if (sBlobEl) sBlobEl.innerHTML = blobOk
                    ? '<span style="color:#059669;font-weight:600;">Configured ✓</span>'
                    : '<span style="color:#D97706;font-weight:600;">BLOB_READ_WRITE_TOKEN not set</span>';
                const gEl = document.getElementById('status-gemini');
                if (gEl) gEl.outerHTML = pill(true, 'Connected').replace('span>', `span id="status-gemini">`);
                const bEl = document.getElementById('status-blob');
                if (bEl) bEl.innerHTML = blobOk ? 'Configured' : 'Not set';
                if (bEl) { bEl.style.background = blobOk ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.1)'; bEl.style.color = blobOk ? '#34D399' : '#F87171'; }
            }
        }).catch(() => {
            if (sapiEl) sapiEl.innerHTML = '<span style="color:#DC2626;">Offline</span>';
        });

        authedFetch(API_BASE + '/api/jobber-status').then(r => r.ok ? r.json() : null).then(d => {
            if (!d) return;
            if (sjobberEl) {
                sjobberEl.innerHTML = d.connected
                    ? '<span style="color:#059669;font-weight:600;">Connected ✓</span>'
                    : (d.hasClientId
                        ? '<span style="color:#D97706;font-weight:600;">Not authorized — click Connect</span>'
                        : '<span style="color:#DC2626;font-weight:600;">JOBBER_CLIENT_ID not set</span>');
            }
            const jEl = document.getElementById('status-jobber');
            if (jEl) { jEl.textContent = d.connected ? 'Connected' : 'Not connected'; jEl.style.background = d.connected ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.1)'; jEl.style.color = d.connected ? '#34D399' : '#F87171'; }
            if (bConnect && connectOk) {
                if (d.connected) { bConnect.style.display = 'none'; connectOk.style.display = 'inline'; }
                else if (d.authUrl) { bConnect.style.display = 'inline-flex'; connectOk.style.display = 'none'; }
            }
        }).catch(() => {
            if (sjobberEl) sjobberEl.innerHTML = '<span style="color:#DC2626;">Could not check status</span>';
        });
    }

    if (state.editingJobId) {
        const inp = document.getElementById('edit-job-input');
        if (inp) {
            inp.focus();
            inp.select();
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') saveJobAssign(state.editingJobId);
                if (e.key === 'Escape') { state.editingJobId = null; render(); }
            });
        }
    }
}

function filterHistory() {
    const search = (document.getElementById('history-search')?.value || '').toLowerCase();
    const filter = document.getElementById('history-filter')?.value || 'all';
    let visible = 0;
    document.querySelectorAll('.history-row').forEach(el => {
        const matchSearch = !search || (el.dataset.search || '').includes(search);
        const matchFilter = filter === 'all' || el.dataset.status === filter;
        const show = matchSearch && matchFilter;
        el.style.display = show ? '' : 'none';
        if (show) visible++;
    });
    const noRes = document.getElementById('history-no-results');
    if (noRes) noRes.style.display = visible === 0 ? '' : 'none';
}

/* ── File Handling & Extraction ── */
function applyExtractResult(json) {
    state.uploading = false;
    state.receipt = json.data;
    state.view = 'review';
    document.getElementById('breadcrumb').innerHTML =
        '<span style="color:#6B7280;cursor:pointer;text-decoration:underline;text-decoration-color:#D1D5DB;" onclick="navigate(\'upload\')">Upload Receipt</span>' +
        '<span style="margin:0 6px;color:#D1D5DB;">/</span>' +
        '<span style="color:#1F2937;font-weight:600;">Review</span>';
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    toast('Receipt analyzed successfully!', 'success');
    render();
}

function startFileQueue(files) {
    const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif', 'application/pdf'];
    const valid = files.filter(f => allowed.includes(f.type));
    if (!valid.length) { toast('Please upload JPG, PNG, WEBP, or PDF files', 'error'); return; }
    queueUploadFiles(valid);
}

async function queueUploadFiles(files) {
    if (!sb || !currentUser) { toast('Not signed in', 'error'); return; }

    toast(`Uploading ${files.length} file${files.length > 1 ? 's' : ''} to queue…`, 'info');

    // Upload ALL files in parallel so tab only needs to stay open ~4s total (not N×4s)
    const results = await Promise.all(files.map(async (file) => {
        try {
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const path = `${currentUser.id}/${Date.now()}_${safeName}`;

            const { error: upErr } = await sb.storage
                .from('receipts')
                .upload(path, file, { contentType: file.type, upsert: false });
            if (upErr) { toast(`Upload failed for ${file.name}: ${upErr.message}`, 'error'); return null; }

            const { data: urlData, error: urlErr } = await sb.storage
                .from('receipts')
                .createSignedUrl(path, 31536000);
            if (urlErr || !urlData?.signedUrl) { toast(`Could not get URL for ${file.name}`, 'error'); return null; }

            const fileType = file.type === 'application/pdf' ? 'pdf' : 'img';
            const qRes = await authedFetch(API_BASE + '/api/queue-upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileName: file.name, fileUrl: urlData.signedUrl, fileType })
            });
            const qData = await qRes.json();
            if (!qRes.ok || !qData.success) { toast(`Queue insert failed for ${file.name}: ${qData.error || 'unknown'}`, 'error'); return null; }
            return qData.id;
        } catch (e) {
            toast(`Error queuing ${file.name}: ${e.message}`, 'error');
            return null;
        }
    }));

    const queueIds = results.filter(Boolean);

    if (queueIds.length > 0) {
        toast(`${queueIds.length} receipt${queueIds.length > 1 ? 's' : ''} queued — processing in background`, 'success', 5000);
        await loadReviewQueue();
        navigate('review-queue');
        // Process sequentially (one at a time) to avoid Gemini rate limits
        processQueueSequentially(queueIds);
    }
}

async function processQueueSequentially(queueIds) {
    for (const queueId of queueIds) {
        try {
            await authedFetch(API_BASE + '/api/process-queue-item', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ queueId })
            });
        } catch (e) {
            console.warn('[queue] process error for', queueId, e.message);
        }
    }
}

async function processNextInQueue() {
    const file = state.fileQueue[state.queueIndex];
    if (!file) return;
    await handleFile(file);
}

function advanceQueue() {
    state.queueIndex++;
    if (state.fileQueue.length > 0 && state.queueIndex < state.fileQueue.length) {
        processNextInQueue();
    } else {
        state.fileQueue = [];
        state.queueIndex = 0;
        navigate('upload');
    }
}

async function handleFile(file) {
    const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif', 'application/pdf'];
    if (!allowed.includes(file.type)) {
        toast('Please upload a JPG, PNG, WEBP, or PDF file', 'error');
        return;
    }

    const DIRECT_LIMIT = 4 * 1024 * 1024; // 4MB — Vercel serverless body limit

    // Large PDFs: upload directly to Supabase Storage, bypassing Vercel's 4.5MB limit
    if (file.size > DIRECT_LIMIT && file.type === 'application/pdf') {
        await handleLargeFile(file);
        return;
    }

    if (file.size > DIRECT_LIMIT) {
        toast('Images must be under 4MB. For large PDFs there is no size limit.', 'error');
        return;
    }

    state.uploading = true;
    render();

    const formData = new FormData();
    formData.append('receipt', file);

    try {
        const res = await authedFetch(API_BASE + '/api/extract', { method: 'POST', body: formData });
        if (res.status === 401) { doLogout(); return; }
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
            throw new Error((await res.text()) || `Server error (${res.status})`);
        }
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.error || 'Extraction failed');
        applyExtractResult(json);
    } catch (err) {
        state.uploading = false;
        render();
        toast('Error: ' + (err.message || 'Could not extract receipt'), 'error', 5000);
        console.error(err);
    }
}

async function handleLargeFile(file) {
    if (!sb || !currentUser) { toast('Not signed in', 'error'); return; }
    state.uploading = true;
    render();
    toast('Uploading large PDF…', 'info');

    try {
        // Upload directly to Supabase Storage (no Vercel serverless involved)
        const path = `${currentUser.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error: upErr } = await sb.storage
            .from('receipts')
            .upload(path, file, { contentType: file.type, upsert: false });
        if (upErr) throw new Error('Storage upload failed: ' + upErr.message);

        // Get a 1-year signed URL for the backend to fetch and for long-term storage
        const { data: urlData, error: urlErr } = await sb.storage
            .from('receipts')
            .createSignedUrl(path, 31536000);
        if (urlErr || !urlData?.signedUrl) throw new Error('Could not get file URL');

        toast('Processing PDF…', 'info');

        const res = await authedFetch(API_BASE + '/api/extract-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileUrl: urlData.signedUrl, mimeType: file.type, originalName: file.name })
        });
        if (res.status === 401) { doLogout(); return; }
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
            throw new Error((await res.text()) || `Server error (${res.status})`);
        }
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.error || 'Extraction failed');

        applyExtractResult(json);
    } catch (err) {
        state.uploading = false;
        render();
        toast('Error: ' + (err.message || 'Could not process PDF'), 'error', 5000);
        console.error(err);
    }
}

/* ── Review Queue ── */
let _queuePollTimer = null;

function stopQueuePolling() {
    if (_queuePollTimer) { clearInterval(_queuePollTimer); _queuePollTimer = null; }
}

function startQueuePolling() {
    stopQueuePolling();
    loadReviewQueue();
    _queuePollTimer = setInterval(async () => {
        await loadReviewQueue();
        if (state.view === 'review-queue') render();
    }, 5000);
}

async function loadReviewQueue() {
    if (!sb || !currentUser) return;
    try {
        const { data } = await sb.from('upload_queue')
            .select('*')
            .eq('user_id', currentUser.id)
            .not('status', 'in', '("reviewed","discarded")')
            .order('created_at', { ascending: false });
        state.reviewItems = data || [];
        updateReviewBadge();
    } catch (e) {
        console.warn('[review-queue] load error:', e.message);
    }
}

function updateReviewBadge() {
    const count = state.reviewItems.filter(r => r.status === 'done').length;
    const b = document.getElementById('review-badge');
    if (!b) return;
    b.textContent = count;
    b.style.display = count > 0 ? 'inline' : 'none';
}

async function queueSave(id) {
    if (state.savingQueueItem) return;
    const item = state.reviewItems.find(i => i.id === id);
    if (!item) return;

    const vendor = document.getElementById('rq-vendor')?.value || item.vendor;
    const invoice = document.getElementById('rq-invoice')?.value || item.invoice_no;
    const date = document.getElementById('rq-date')?.value || item.date;
    const total = document.getElementById('rq-total')?.value || String(item.amount);
    const jobNo = document.getElementById('rq-jobno')?.value?.trim() || item.job_no;
    const category = document.getElementById('rq-category')?.value || state.settings.category;

    state.savingQueueItem = true;
    render();

    try {
        const now = new Date();
        const savedAt = now.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ', ' +
            now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
        const rec = {
            id: genId(),
            vendor, date,
            amount: parseFloat(total) || 0,
            jobNo: jobNo || null,
            status: 'posted',
            invoiceNo: invoice,
            category, savedAt,
            total,
            items: item.items || [],
            receiptBlobUrl: item.file_url || null
        };
        state.history.unshift(rec);
        updateBadge();
        await upsertReceipt(rec);

        await sb.from('upload_queue').update({ status: 'reviewed', receipt_id: rec.id }).eq('id', id);
        state.reviewItems = state.reviewItems.filter(i => i.id !== id);
        state.selectedQueueItemId = state.reviewItems.length > 0 ? state.reviewItems[0].id : null;
        updateReviewBadge();
        toast('Receipt saved to history', 'success');
    } catch (e) {
        toast('Save failed: ' + e.message, 'error');
    } finally {
        state.savingQueueItem = false;
        render();
    }
}

async function queuePostToJobber(id) {
    if (state.postingQueueItem) return;
    const item = state.reviewItems.find(i => i.id === id);
    if (!item) return;

    const vendor = document.getElementById('rq-vendor')?.value || item.vendor;
    const invoice = document.getElementById('rq-invoice')?.value || item.invoice_no;
    const date = document.getElementById('rq-date')?.value || item.date;
    const total = document.getElementById('rq-total')?.value || String(item.amount);
    const jobNo = document.getElementById('rq-jobno')?.value?.trim() || item.job_no;
    const category = document.getElementById('rq-category')?.value || state.settings.category;

    if (!jobNo) {
        toast('Enter a job number before posting to Jobber', 'warning');
        document.getElementById('rq-jobno')?.focus();
        return;
    }

    state.postingQueueItem = true;
    render();

    try {
        const expRes = await authedFetch(API_BASE + '/api/create-expense', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ vendor, invoiceNo: invoice, date, total, jobNo, category, receiptBlobUrl: item.file_url || null })
        });
        const expData = await expRes.json();
        if (!expRes.ok || (!expData.success && !expData.expenseId)) {
            throw new Error(expData.error || 'Failed to create expense in Jobber');
        }

        const now = new Date();
        const savedAt = now.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ', ' +
            now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
        const rec = {
            id: genId(),
            vendor, date,
            amount: parseFloat(total) || 0,
            jobNo,
            status: 'jobber',
            invoiceNo: invoice,
            category, savedAt,
            total,
            items: item.items || [],
            receiptBlobUrl: item.file_url || null,
            jobberExpenseId: expData.expenseId || 'created'
        };
        state.history.unshift(rec);
        updateBadge();
        await upsertReceipt(rec);

        await sb.from('upload_queue').update({ status: 'reviewed', receipt_id: rec.id }).eq('id', id);
        state.reviewItems = state.reviewItems.filter(i => i.id !== id);
        state.selectedQueueItemId = state.reviewItems.length > 0 ? state.reviewItems[0].id : null;
        updateReviewBadge();
        toast('Posted to Jobber!', 'success');
    } catch (e) {
        toast('Jobber error: ' + e.message, 'error', 6000);
    } finally {
        state.postingQueueItem = false;
        render();
    }
}

async function queueDiscard(id) {
    try {
        await sb.from('upload_queue').update({ status: 'discarded' }).eq('id', id);
        state.reviewItems = state.reviewItems.filter(i => i.id !== id);
        state.selectedQueueItemId = state.reviewItems.length > 0 ? state.reviewItems[0].id : null;
        updateReviewBadge();
        toast('Removed from queue', 'info');
        render();
    } catch (e) {
        toast('Error: ' + e.message, 'error');
    }
}

/* ── Post to Jobber ── */
async function postToJobber() {
    if (!state.receipt || state.postingToJobber) return;
    const r = state.receipt;
    const jobNo = document.getElementById('f-jobno')?.value?.trim() || r.jobNo;
    if (!jobNo) {
        toast('Enter a job number before posting to Jobber', 'warning');
        document.getElementById('f-jobno')?.focus();
        return;
    }
    const vendor = document.getElementById('f-vendor')?.value || r.vendor;
    const invoice = document.getElementById('f-invoice')?.value || r.invoiceNo;
    const date = document.getElementById('f-date')?.value || r.date;
    const category = document.getElementById('f-category')?.value || state.settings.category;
    state.postingToJobber = true;
    render();
    try {
        const expRes = await authedFetch(API_BASE + '/api/create-expense', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                vendor,
                invoiceNo: invoice,
                date,
                total: r.total,
                jobNo,
                category,
                receiptBlobUrl: r.receiptBlobUrl || null
            })
        });
        const expData = await expRes.json();
        // Treat as success if Jobber returned an expenseId, even if backend says success:false
        // (backend may fail after Jobber creates the expense, e.g. DB write error)
        if (!expRes.ok || (!expData.success && !expData.expenseId)) {
            throw new Error(expData.error || 'Failed to create expense in Jobber');
        }
        state.postingToJobber = false;
        state.receipt.jobberExpenseId = expData.expenseId || 'created';
        state.receipt.jobNo = jobNo;
        state.receipt.jobStatus = 'found';
        const now = new Date();
        const savedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
            now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        const newRec = {
            id: genId(),
            vendor,
            date,
            amount: parseFloat(r.total) || 0,
            jobNo,
            status: 'jobber',
            invoiceNo: invoice,
            category,
            savedAt,
            total: r.total,
            receiptBlobUrl: r.receiptBlobUrl || null,
            jobberExpenseId: expData.expenseId || null
        };
        state.history.unshift(newRec);
        upsertReceipt(newRec).catch(e => console.warn('[supabase] save failed:', e.message));
        updateBadge();
        toast(`Posted to Jobber — Job #${jobNo}`, 'success', 5000);
        setTimeout(() => advanceQueue(), 1000);
    } catch (err) {
        state.postingToJobber = false;
        render();
        toast('Jobber error: ' + (err.message || 'Unknown error'), 'error', 6000);
        console.error(err);
    }
}

    const jobNo = document.getElementById('f-jobno')?.value?.trim() || r.jobNo;
    const category = document.getElementById('f-category')?.value || state.settings.category;

    const now = new Date();
    const savedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    const rec = {
        id: genId(),
        vendor,
        date,
        amount: parseFloat(r.total) || 0,
        jobNo: jobNo || null,
        status: 'posted',
        invoiceNo: invoice,

function flagError() {
    if (!state.receipt) return;
    const r = state.receipt;
    const jobNo = document.getElementById('f-jobno')?.value?.trim() || r.jobNo;
    const vendor = document.getElementById('f-vendor')?.value || r.vendor;

    const now = new Date();
    const savedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    const rec = {
        id: genId(),
        vendor,
        date: r.date,
        amount: parseFloat(r.total) || 0,
        jobNo: jobNo || null,
        status: 'error',
        invoiceNo: r.invoiceNo,
        savedAt,
        total: r.total,
        receiptBlobUrl: r.receiptBlobUrl || null,
        error: jobNo ? 'Manually flagged for review' : 'No job number found on receipt'
    };

    state.history.unshift(rec);
    updateBadge();
    upsertReceipt(rec).catch(e => console.warn('[supabase] flag failed:', e.message));
    toast('Receipt flagged and moved to error queue', 'info');
    advanceQueue();
}

/* ── Post saved receipt to Jobber from history ── */
async function postFromHistory(id) {
    const rec = state.history.find(r => r.id === id);
    if (!rec) return;
    if (!rec.jobNo) {
        toast('No job number on this receipt — assign one first', 'warning');
        return;
    }

    const btn = document.querySelector(`[onclick="postFromHistory('${id}')"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Posting…'; }

    try {
        const expRes = await authedFetch(API_BASE + '/api/create-expense', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                vendor: rec.vendor,
                invoiceNo: rec.invoiceNo,
                date: rec.date,
                total: rec.total || rec.amount,
                jobNo: rec.jobNo,
                category: rec.category,
                receiptBlobUrl: rec.receiptBlobUrl || null
            })
        });
        const expData = await expRes.json();
        if (!expRes.ok || (!expData.success && !expData.expenseId)) {
            throw new Error(expData.error || 'Failed to create expense in Jobber');
        }
        rec.status = 'jobber';
        rec.jobberExpenseId = expData.expenseId || 'created';
        const now = new Date();
        rec.savedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
            now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        updateReceiptStatus(rec.id, { status: 'jobber', jobberExpenseId: rec.jobberExpenseId, savedAt: rec.savedAt })
            .catch(e => console.warn('[supabase] update failed:', e.message));
        updateBadge();
        toast(`Posted to Jobber — Job #${rec.jobNo}`, 'success', 5000);
        render();
    } catch (err) {
        toast('Jobber error: ' + (err.message || 'Unknown error'), 'error', 6000);
        if (btn) { btn.disabled = false; btn.textContent = 'Post to Jobber'; }
    }
}

/* ── Delete receipt ── */
async function deleteReceipt(id) {
    if (!confirm('Delete this receipt? This cannot be undone.')) return;
    state.history = state.history.filter(r => r.id !== id);
    updateBadge();
    render();
    if (sb && currentUser) {
        sb.from('receipts').delete().eq('id', id).eq('user_id', currentUser.id)
            .then(({ error }) => { if (error) console.warn('[supabase] delete failed:', error.message); });
    }
    toast('Receipt deleted', 'info');
}

/* ── Error Queue Actions ── */
function startJobEdit(id) {
    state.editingJobId = id;
    render();
}

function saveJobAssign(id) {
    const inp = document.getElementById('edit-job-input');
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) { toast('Please enter a job number', 'error'); return; }

    const rec = state.history.find(r => r.id === id);
    if (rec) {
        rec.jobNo = val;
        rec.status = 'posted';
        const now = new Date();
        rec.savedAt = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
            now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        delete rec.error;
        updateReceiptStatus(id, { jobNo: val, status: 'posted', savedAt: rec.savedAt, error: null })
            .catch(e => console.warn('[supabase] update failed:', e.message));
    }

    state.editingJobId = null;
    updateBadge();
    toast('Job number assigned — ' + val, 'success');
    render();
}

/* ── HTML Escape ── */
function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
